name: ci

# Verificación ligera en cada push/PR: tipos y pruebas del dominio (corren en
# Node, sin toolchain nativo). El empaquetado pesado y la publicación de
# binarios viven en `release.yml`, que se dispara al crear un tag de versión.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
