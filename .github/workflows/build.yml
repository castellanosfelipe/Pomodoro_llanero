name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Pruebas del dominio: rápidas, sin toolchain nativo. Corren en Node.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  # Empaquetado nativo en una matriz de plataformas (macOS Apple Silicon +
  # Intel, Windows). Sólo se ejecuta tras pasar las pruebas.
  bundle:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest # Intel
            args: "--target x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - name: Cache de cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - run: npm ci
      - name: Build de Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
